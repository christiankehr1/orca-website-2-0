<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>ORCA — Sonar</title>
<link rel="stylesheet" href="colors_and_type.css" />
<style>
  html, body { margin: 0; height: 100%; background: #fff; font-family: var(--font-sans); color: var(--app-ink); }
  #root { position: fixed; inset: 0; }
  * { -webkit-font-smoothing: antialiased; box-sizing: border-box; }
  button { font-family: var(--font-sans); }
  ::-webkit-scrollbar { width: 11px; height: 11px; }
  ::-webkit-scrollbar-thumb { background: #d3dbe5; border-radius: 999px; border: 3px solid transparent; background-clip: padding-box; }
  ::-webkit-scrollbar-thumb:hover { background: #c2ccd9; background-clip: padding-box; }

  @keyframes cardPop { from { opacity: 0; transform: translateY(5px) scale(.985); } to { opacity: 1; transform: none; } }
  @keyframes panelIn { from { opacity: 0; transform: translateX(14px); } to { opacity: 1; transform: none; } }
  @keyframes ripple { from { transform: scale(.5); opacity: .85; } to { transform: scale(1.7); opacity: 0; } }
  @keyframes markIn { from { background-color: rgba(0,192,233,.5); } to {} }
  @keyframes surface { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: none; } }
  @keyframes sonarPing { 0% { transform: scale(.5); opacity: .7; } 80% { opacity: 0; } 100% { transform: scale(2.6); opacity: 0; } }
  @keyframes dotPulse { 0%, 100% { opacity: .25; transform: scale(.8); } 50% { opacity: 1; transform: scale(1); } }
</style>
</head>
<body>
<div id="root"></div>

<template id="__bundler_thumbnail" data-bg-color="#26333f">
  <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
    <rect width="100" height="100" fill="#26333f"/>
    <g fill="none" stroke="#00c0e9" stroke-width="2.4">
      <path d="M50 50 a14 14 0 0 1 14 -14" />
      <path d="M50 50 a24 24 0 0 1 24 -24" opacity=".6" />
      <path d="M50 50 a34 34 0 0 1 34 -34" opacity=".3" />
    </g>
    <circle cx="50" cy="50" r="4" fill="#00c0e9"/>
    <rect x="20" y="60" width="36" height="5" rx="2.5" fill="#fff" opacity=".85"/>
    <rect x="20" y="71" width="26" height="5" rx="2.5" fill="#fff" opacity=".5"/>
  </svg>
</template>
